# Production overlay — GHCR image, deployed via GHA + Tailscale SSH
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  claude-hub:
    image: ghcr.io/minyic7/claude-hub:latest
    ports:
      - "7700:7700"
    volumes:
      - claude-config:/home/claude/.claude
      - claude-data:/data

volumes:
  claude-config:
  claude-data:
